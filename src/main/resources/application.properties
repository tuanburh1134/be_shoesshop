# Gemini API key (ưu tiên biến môi trường GOOGLE_API_KEY hoặc gemini.api.key)
gemini.api.key=AIzaSyDR2xhkTA7lql7EY_9m3X5U39qv01_9Gdc
# Model mặc định ổn định (v1beta): ví dụ gemini-1.5-flash, gemini-1.5-pro. Nếu dùng 3.1 preview, cần chính xác ID trong AI Studio.
gemini.api.model=gemini-1.5-flash
# ==============================================================================
# DATASOURCE - MySQL (use env vars on Render)
# ==============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shop_shoes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / HIBERNATE Configuration
# 'update' is convenient for development; change to 'validate'/'none' in production.
spring.jpa.hibernate.ddl-auto=update

# Show SQL query in console (Optional - useful for debugging JPA)
spring.jpa.show-sql=true
# Format the SQL for better readability (Optional)
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 console when using MySQL
spring.h2.console.enabled=false

# Server port (Render provides PORT env var)
server.port=${PORT:8080}

# LOGGING Levels
logging.level.org.springframework=INFO
logging.level.com.shoes.ecommerce=DEBUG

# Google OAuth2 Web Client ID (required for /api/auth/google)
# Example: 1234567890-xxxxx.apps.googleusercontent.com
google.oauth.client-id=213568517226-ac26ekl9ngmsh2agc1i3qmtspnajd78c.apps.googleusercontent.com

# PayOS (sandbox by default; set via environment on Render)
payos.base-url=${PAYOS_BASE_URL:https://api-merchant.payos.vn}
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:8081/cart.html?pay=success}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:8081/cart.html?pay=cancel}