# Gemini API key (không hardcode ở frontend; ưu tiên env GOOGLE_API_KEY hoặc GEMINI_API_KEY)
gemini.api.key=${GOOGLE_API_KEY:${GEMINI_API_KEY:}}
# Model mặc định: gemini-2.5-flash
gemini.api.model=${GEMINI_API_MODEL:gemini-2.5-flash}
# Endpoint template: hỗ trợ %s hoặc {model}
gemini.api.endpoint-template=${GEMINI_API_ENDPOINT_TEMPLATE:https://generativelanguage.googleapis.com/v1beta/models/%s:generateContent}
# AI behavior controls
gemini.system.instruction=${GEMINI_SYSTEM_INSTRUCTION:Bạn là trợ lý AI của website bán giày. Trả lời ngắn gọn, chính xác, thân thiện bằng tiếng Việt. Ưu tiên tư vấn size, màu, giá, cách đặt hàng và thanh toán.}
gemini.temperature=${GEMINI_TEMPERATURE:0.7}
gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:512}
# ==============================================================================
# DATASOURCE - MySQL (use env vars on Render)
# ==============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shop_shoes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / HIBERNATE Configuration
# 'update' is convenient for development; change to 'validate'/'none' in production.
spring.jpa.hibernate.ddl-auto=update

# Show SQL query in console (Optional - useful for debugging JPA)
spring.jpa.show-sql=true
# Format the SQL for better readability (Optional)
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 console when using MySQL
spring.h2.console.enabled=false

# Server port (Render provides PORT env var)
server.port=${PORT:8080}

# LOGGING Levels
logging.level.org.springframework=INFO
logging.level.com.shoes.ecommerce=DEBUG

# Google OAuth2 Web Client ID (required for /api/auth/google)
# Example: 1234567890-xxxxx.apps.googleusercontent.com
google.oauth.client-id=213568517226-ac26ekl9ngmsh2agc1i3qmtspnajd78c.apps.googleusercontent.com

# PayOS (sandbox by default; set via environment on Render)
# Support multiple env naming styles to reduce misconfiguration risk.
payos.base-url=${PAYOS_BASE_URL:https://api-merchant.payos.vn}
payos.client-id=${PAYOS_CLIENT_ID:${PAYOS_CLIENTID:${PAYOS_CLIENT_ID_SANDBOX:}}}
payos.api-key=${PAYOS_API_KEY:${PAYOS_APIKEY:${PAYOS_API_KEY_SANDBOX:}}}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:${PAYOS_CHECKSUMKEY:${PAYOS_CHECKSUM_KEY_SANDBOX:}}}

# Use public HTTPS defaults for production deploy (override by PAYOS_RETURN_URL / PAYOS_CANCEL_URL when needed).
payos.return-url=${PAYOS_RETURN_URL:https://fe-shoesshop.onrender.com/cart.html?pay=success}
payos.cancel-url=${PAYOS_CANCEL_URL:https://fe-shoesshop.onrender.com/cart.html?pay=cancel}